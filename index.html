<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>수요 코딩회 보드</title>
    <style>
      :root {
        --bg: #f4f1e8;
        --surface: rgba(255, 255, 255, 0.82);
        --surface-strong: #fffdf8;
        --text: #1f2937;
        --muted: #6b7280;
        --line: rgba(115, 125, 140, 0.22);
        --accent: #cf5c36;
        --accent-soft: #f7dccf;
        --shadow: 0 24px 60px rgba(36, 39, 46, 0.14);
        --radius: 24px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "SUIT Variable", "Pretendard", "Noto Sans KR", sans-serif;
        line-height: 1.5;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(207, 92, 54, 0.14), transparent 30%),
          radial-gradient(circle at top right, rgba(43, 90, 148, 0.12), transparent 28%),
          linear-gradient(180deg, #f8f5ee 0%, #ece7dc 100%);
      }

      button,
      input,
      select {
        font: inherit;
      }

      .page-shell {
        width: min(1240px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 40px 0 56px;
      }

      .page-intro {
        margin-bottom: 24px;
      }

      .page-intro p {
        margin: 0;
        color: var(--muted);
      }

      .page-grid {
        display: grid;
        grid-template-columns: minmax(0, 2fr) minmax(320px, 1fr);
        gap: 20px;
        align-items: start;
      }

      .mount-card {
        border: 1px solid var(--line);
        border-radius: 28px;
        background: var(--surface);
        backdrop-filter: blur(16px);
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      #app-root,
      #debug-root {
        padding: 22px;
      }

      .board-app {
        display: grid;
        gap: 18px;
      }

      .app-hero,
      .surface-card,
      .summary-card,
      .task-card,
      .debug-panel,
      .empty-state {
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--surface-strong);
        box-shadow: 0 16px 40px rgba(31, 41, 55, 0.08);
      }

      .app-hero {
        padding: 24px;
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: flex-start;
      }

      .eyebrow {
        margin: 0 0 8px;
        color: var(--accent);
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      h1 {
        font-size: clamp(28px, 4vw, 42px);
        line-height: 1.1;
      }

      h2 {
        font-size: 20px;
        margin-bottom: 14px;
      }

      h3 {
        font-size: 15px;
      }

      .hero-description {
        max-width: 56ch;
        margin-top: 12px;
        color: var(--muted);
      }

      .hero-badges {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .badge,
      .priority-chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 8px 12px;
        border-radius: 999px;
        font-size: 13px;
        font-weight: 700;
      }

      .badge {
        background: var(--accent-soft);
        color: #8a371d;
      }

      .summary-grid {
        display: grid;
        gap: 14px;
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .summary-card {
        padding: 18px 20px;
      }

      .summary-label {
        display: block;
        color: var(--muted);
        font-size: 13px;
        margin-bottom: 8px;
      }

      .summary-value {
        font-size: 32px;
      }

      .board-content {
        display: grid;
        gap: 18px;
        grid-template-columns: minmax(320px, 1fr) minmax(0, 1.3fr);
      }

      .board-left,
      .board-right {
        display: grid;
        gap: 18px;
        align-content: start;
      }

      .surface-card {
        padding: 20px;
      }

      .field-grid {
        display: grid;
        gap: 14px;
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .field-grid.compact {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .field {
        display: grid;
        gap: 8px;
        color: var(--muted);
        font-size: 14px;
      }

      .field-search {
        grid-column: span 2;
      }

      .text-input,
      .select-input,
      .primary-button,
      .ghost-button {
        width: 100%;
        border-radius: 16px;
        border: 1px solid rgba(115, 125, 140, 0.24);
        transition: border-color 160ms ease, transform 160ms ease, box-shadow 160ms ease;
      }

      .text-input,
      .select-input {
        min-height: 46px;
        padding: 0 14px;
        background: #fff;
      }

      .text-input:focus,
      .select-input:focus {
        outline: none;
        border-color: rgba(207, 92, 54, 0.55);
        box-shadow: 0 0 0 4px rgba(207, 92, 54, 0.12);
      }

      .primary-button,
      .ghost-button {
        cursor: pointer;
      }

      .primary-button {
        margin-top: 16px;
        padding: 14px 18px;
        color: white;
        background: linear-gradient(135deg, #cf5c36 0%, #b64723 100%);
      }

      .primary-button:hover,
      .ghost-button:hover {
        transform: translateY(-1px);
      }

      .filter-header,
      .task-panel-header,
      .debug-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .filter-count,
      .task-panel-meta {
        color: var(--muted);
        font-size: 13px;
      }

      .task-list {
        display: grid;
        gap: 12px;
      }

      .task-card {
        padding: 18px;
        display: grid;
        gap: 14px;
      }

      .task-card.done {
        background: #f7f4ec;
      }

      .task-card-top,
      .task-card-bottom {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
      }

      .task-title-block {
        display: grid;
        gap: 6px;
      }

      .task-meta {
        color: var(--muted);
        font-size: 13px;
      }

      .priority-chip.high {
        background: #fde2db;
        color: #8d2f15;
      }

      .priority-chip.medium {
        background: #f6eed7;
        color: #896816;
      }

      .priority-chip.low {
        background: #deefea;
        color: #236651;
      }

      .ghost-button {
        max-width: 160px;
        padding: 10px 14px;
        background: #fff;
      }

      .empty-state {
        padding: 26px;
        display: grid;
        gap: 8px;
        text-align: center;
      }

      .debug-panel {
        padding: 20px;
        display: grid;
        gap: 16px;
      }

      .debug-section {
        display: grid;
        gap: 10px;
      }

      .debug-list {
        margin: 0;
        padding-left: 18px;
        color: var(--muted);
        display: grid;
        gap: 6px;
        font-family: "SFMono-Regular", "JetBrains Mono", monospace;
        font-size: 12px;
      }

      @media (max-width: 1080px) {
        .page-grid,
        .board-content {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 760px) {
        .page-shell {
          width: min(100vw - 20px, 100%);
          padding-top: 20px;
        }

        #app-root,
        #debug-root {
          padding: 16px;
        }

        .summary-grid,
        .field-grid,
        .field-grid.compact {
          grid-template-columns: 1fr;
        }

        .field-search {
          grid-column: span 1;
        }

        .app-hero,
        .task-card-top,
        .task-card-bottom,
        .filter-header,
        .task-panel-header,
        .debug-header {
          flex-direction: column;
          align-items: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <div class="page-shell">
      <header class="page-intro">
        <p>기존 Virtual DOM diff/patch 엔진 위에 구현한 Mini React 런타임과 테스트 페이지입니다.</p>
      </header>
      <div class="page-grid">
        <main class="mount-card">
          <div id="app-root"></div>
        </main>
        <aside class="mount-card">
          <div id="debug-root"></div>
        </aside>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
